<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernplan H26 · Kalender</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --surface: #141820;
  --border: #1e2a3a;
  --text: #d8dde8;
  --muted: #3d4f68;
  --free-bg: #0a0d14;
  --font-mono: 'DM Mono', monospace;
  --font-head: 'Syne', sans-serif;
  --cell-w: 130px;
  --cell-h: 110px;
}
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; min-width: 930px; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,23,0.95); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 48px;
}
.logo { font-family: var(--font-head); font-size: 14px; font-weight: 800; color: var(--text); }
.logo span { opacity: .35; font-weight: 700; }
.hdr-info { font-size: 10px; color: var(--muted); margin-left: auto; }
.hdr-info span { color: var(--text); }

/* ── Day-of-week header ── */
#cal-center {
  max-width: 930px;
  margin: 0 auto;
  padding: 0 20px;
}
#dow-header {
  display: grid; grid-template-columns: repeat(7, var(--cell-w));
  gap: 3px; padding: 8px 0 4px;
  position: sticky; top: 48px; z-index: 99;
  background: var(--bg);
}
.dow-label {
  text-align: center; font-size: 9px; color: var(--muted);
  letter-spacing: .1em; text-transform: uppercase; padding: 4px 0;
}
.dow-label.weekend { color: #2a3a50; }

/* ── Calendar grid ── */
#cal-wrap { padding: 4px 0 60px; overflow-y: auto; }
.month-block { margin-bottom: 4px; }
.month-label {
  font-family: var(--font-head); font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: .12em; text-transform: uppercase;
  padding: 10px 2px 4px;
}
.week-row {
  display: grid; grid-template-columns: repeat(7, var(--cell-w));
  gap: 3px; margin-bottom: 3px;
}

/* ── Cell ── */
.cell {
  height: var(--cell-h);
  border-radius: 6px;
  border: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: border-color .15s;
  overflow: hidden;
  user-select: none;
}
.cell:hover { border-color: #2d4060; }
.cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cell.outside { background: rgba(255,255,255,.01); }
.cell.weekend-free { background: var(--free-bg); }
.cell.free { background: var(--free-bg); border-color: #141c28; }
.cell.free:hover { border-color: #1e2d40; }

/* Lernday cell */
.cell.lernday { background: var(--surface); }
.cell.lernday.spanning { /* day spans 2 calendar days */ }

/* Color strip on left */
.cell-strip {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 6px 0 0 6px;
}

/* Day number top-right */
.cell-date {
  position: absolute; top: 7px; right: 9px;
  font-size: 11px; color: var(--muted); font-weight: 500;
}
.cell.today .cell-date { color: #38bdf8; font-weight: 700; }

/* Content */
.cell-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 8px 10px 8px 14px;
}
.cell-tag { font-size: 10px; color: #5a7a9a; margin-bottom: 3px; }
.cell-title { font-size: 11px; color: var(--text); font-weight: 500; line-height: 1.3; margin-bottom: 5px; }
.cell-meta {
  display: flex; gap: 8px;
  font-size: 10px; color: #5a7a9a;
}
.cell-meta .modules { }
.cell-meta .time { }
.cell-meta .questions { }

/* Free label */
.free-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #1e2d3d; letter-spacing: .08em;
}

/* Drag handle */
.drag-handle {
  position: absolute; top: 0; right: 0; bottom: 0; width: 10px;
  cursor: ew-resize; display: flex; align-items: center; justify-content: center;
}
.drag-handle::after {
  content: ''; display: block;
  width: 2px; height: 24px;
  background: rgba(255,255,255,.08);
  border-radius: 2px;
}
.cell.lernday:hover .drag-handle::after { background: rgba(255,255,255,.2); }

/* Span indicator (continues to next day) */
.span-arrow {
  position: absolute; right: 6px; bottom: 6px;
  font-size: 9px; color: var(--muted); opacity: .5;
}

/* Scrollbar */
#cal-wrap::-webkit-scrollbar { width: 5px; }
#cal-wrap::-webkit-scrollbar-track { background: var(--bg); }
#cal-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Settings ── */
.settings-btn {
  position: fixed; top: 10px; right: 16px; z-index: 200;
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: 14px;
  transition: border-color .15s, color .15s;
}
.settings-btn:hover { border-color: #2d4060; color: var(--text); }

#settings-panel {
  display: none;
  position: fixed; top: 52px; right: 16px; z-index: 200;
  background: #141820; border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px;
  width: 220px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  font-family: var(--font-mono); font-size: 11px;
}
#settings-panel.open { display: block; }
.settings-title {
  font-family: var(--font-head); font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 12px;
}
.day-toggles { display: flex; flex-direction: column; gap: 6px; }
.day-toggle {
  display: flex; align-items: center; justify-content: space-between;
  color: var(--text); cursor: pointer;
  padding: 4px 6px; border-radius: 4px;
  transition: background .12s;
}
.day-toggle:hover { background: rgba(255,255,255,.04); }
.day-toggle input { display: none; }
.toggle-track {
  width: 30px; height: 16px; border-radius: 8px;
  background: var(--border); position: relative;
  transition: background .2s; flex-shrink: 0;
}
.day-toggle input:checked + .toggle-track { background: #2d4a7a; }
.toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--muted); transition: left .2s, background .2s;
}
.day-toggle input:checked + .toggle-track .toggle-thumb {
  left: 16px; background: #38bdf8;
}
.settings-hint {
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 9px; color: var(--muted); line-height: 1.6;
}
</style>
</head>

let explicitLern = new Set(JSON.parse(localStorage.getItem('h26_cal_elern') || '[]'));
// defaultFreeDays: Set of weekday numbers (0=Sun,1=Mon,...,6=Sat) that are free by default
let defaultFreeDays = new Set(JSON.parse(localStorage.getItem('h26_cal_freedays') || '[0,6]'));

function isDefaultFreeDay(d) { return defaultFreeDays.has(d.getDay()); }

function isDayFree(d) {
  const k = dateKey(d);
  if (explicitFree.has(k)) return true;
  if (explicitLern.has(k)) return false;
  return isDefaultFreeDay(d);
}

function saveState() {
  localStorage.setItem('h26_cal_efree',    JSON.stringify([...explicitFree]));
  localStorage.setItem('h26_cal_elern',    JSON.stringify([...explicitLern]));
  localStorage.setItem('h26_cal_span',     JSON.stringify(spanMap));
  localStorage.setItem('h26_cal_freedays', JSON.stringify([...defaultFreeDays]));
}

function updateDefaultFree() {
  defaultFreeDays = new Set();
  [0,1,2,3,4,5,6].forEach(n => {
    if (document.getElementById('free-' + n)?.checked) defaultFreeDays.add(n);
  });
  saveState();
  buildCalendar();
}

function initSettingsPanel() {
  defaultFreeDays.forEach(n => {
    const el = document.getElementById('free-' + n);
    if (el) el.checked = true;
  });
}

// ── Assign lerndays to calendar dates ──
// Returns array of {date, lernTag (1-based index into LERNPLAN_DAYS), span}
function buildAssignment() {
  let result = {}; // dateKey -> {lernIdx, span, continued}
  let lernIdx = 0;  // index into LERNPLAN_DAYS
  let d = new Date(START_DATE);
  let spanRemaining = 0; // how many more days current lerntag needs
  let currentLernIdx = -1;

  while (lernIdx < LERNPLAN_DAYS.length) {
    if (daysBetween(new Date(2026,3,27), d) > 300) break; // safety

    const k = dateKey(d);

    if (isDayFree(d)) {
      d = addDays(d, 1);
      continue;
    }

    if (spanRemaining > 0) {
      // This day is a continuation of previous lerntag
      result[k] = { lernIdx: currentLernIdx, span: 0, continued: true };
      spanRemaining--;
      d = addDays(d, 1);
      continue;
    }

    // Assign next lerntag
    currentLernIdx = lernIdx;
    const lerntag = LERNPLAN_DAYS[lernIdx];
    const extraSpan = (spanMap[lerntag.tag] || 0) +
      (lerntag.vertieft > 300 ? 1 : 0); // auto-span if >5h

    result[k] = { lernIdx, span: extraSpan, continued: false };

    if (extraSpan > 0) {
      spanRemaining = extraSpan;
    }

    lernIdx++;
    d = addDays(d, 1);
  }

  return result;
}

// ── Build calendar grid ──
function buildCalendar() {
  const assignment = buildAssignment();
  const wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '';

  // Find first Monday on or before April 1
  const calStart = new Date(2026, 3, 1); // April 1
  while (calStart.getDay() !== 1) calStart.setDate(calStart.getDate() - 1);

  // Find last Sunday on or after Oct 5
  const calEnd = new Date(2026, 9, 5);
  while (calEnd.getDay() !== 0) calEnd.setDate(calEnd.getDate() + 1);

  let cur = new Date(calStart);
  let currentMonth = -1;
  let weekDiv = null;
  let monthDiv = null;

  while (cur <= calEnd) {
    // Month label
    if (cur.getMonth() !== currentMonth && cur.getDay() === 1) {
      currentMonth = cur.getMonth();
      monthDiv = document.createElement('div');
      monthDiv.className = 'month-block';
      const lbl = document.createElement('div');
      lbl.className = 'month-label';
      lbl.textContent = MONTHS[currentMonth] + ' 2026';
      monthDiv.appendChild(lbl);
      wrap.appendChild(monthDiv);
    }

    // Week row
    if (cur.getDay() === 1) {
      weekDiv = document.createElement('div');
      weekDiv.className = 'week-row';
      (monthDiv || wrap).appendChild(weekDiv);
    }

    const cell = buildCell(cur, assignment);
    weekDiv.appendChild(cell);
    cur = addDays(cur, 1);
  }

  updateHeader(assignment);
}

function buildCell(d, assignment) {
  const k = dateKey(d);
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.key = k;

  const isOutRange = d < new Date(2026, 3, 1) || d > new Date(2026, 9, 5);
  const isTod = d.getTime() === TODAY.getTime();
  if (isTod) cell.classList.add('today');

  // Date number
  const dateEl = document.createElement('div');
  dateEl.className = 'cell-date';
  dateEl.textContent = d.getDate();
  cell.appendChild(dateEl);

  if (isOutRange) {
    cell.classList.add('outside');
    return cell;
  }

  const free = isDayFree(d);
  const asgn = assignment[k];

  if (free && !asgn) {
    cell.classList.add(isDefaultFreeDay(d) && !explicitFree.has(k) ? 'weekend-free' : 'free');
    const lbl = document.createElement('div');
    lbl.className = 'free-label';
    lbl.textContent = isDefaultFreeDay(d) && !explicitFree.has(k) ? '' : 'frei';
    cell.appendChild(lbl);
  } else if (asgn && !asgn.continued) {
    cell.classList.add('lernday');
    const lerntag = LERNPLAN_DAYS[asgn.lernIdx];

    // Color strip
    const strip = document.createElement('div');
    strip.className = 'cell-strip';
    strip.style.background = lerntag.color;
    cell.appendChild(strip);

    // Content
    const content = document.createElement('div');
    content.className = 'cell-content';

    const tagEl = document.createElement('div');
    tagEl.className = 'cell-tag';
    tagEl.textContent = `Tag ${lerntag.tag} · ${lerntag.label}`;

    const h = Math.floor(lerntag.vertieft / 60);
    const m = lerntag.vertieft % 60;
    const timeStr = h > 0 ? `${h}h${m > 0 ? m+'m' : ''}` : `${m}m`;

    const meta = document.createElement('div');
    meta.className = 'cell-meta';
    meta.innerHTML = `<span class="modules">${lerntag.modules} Mod.</span><span class="time">⏱ ${timeStr}</span><span class="questions">✗ ${lerntag.questions}</span>`;

    content.appendChild(tagEl);
    content.appendChild(meta);
    cell.appendChild(content);

    if (asgn.span > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'span-arrow';
      arrow.textContent = '↓';
      cell.appendChild(arrow);
    }

    // Drag handle for spanning
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.dataset.lernTag = lerntag.tag;
    handle.addEventListener('mousedown', startDrag);
    cell.appendChild(handle);

  } else if (asgn && asgn.continued) {
    cell.classList.add('lernday');
    const lerntag = LERNPLAN_DAYS[asgn.lernIdx];
    const strip = document.createElement('div');
    strip.className = 'cell-strip';
    strip.style.background = lerntag.color;
    strip.style.opacity = '.4';
    cell.appendChild(strip);
    const cont = document.createElement('div');
    cont.className = 'free-label';
    cont.style.color = '#1e3050';
    cont.textContent = `↑ Tag ${lerntag.tag}`;
    cell.appendChild(cont);
  } else if (free) {
    cell.classList.add('free');
    const lbl = document.createElement('div');
    lbl.className = 'free-label';
    lbl.textContent = 'frei';
    cell.appendChild(lbl);
  }

  // Click to toggle free/lernday
  cell.addEventListener('click', e => {
    if (e.target.closest('.drag-handle')) return;
    toggleDay(d);
  });

  return cell;
}

function toggleDay(d) {
  const k = dateKey(d);
  if (isDefaultFreeDay(d)) {
    if (explicitLern.has(k)) { explicitLern.delete(k); }
    else { explicitLern.add(k); }
  } else {
    if (explicitFree.has(k)) { explicitFree.delete(k); }
    else { explicitFree.add(k); }
  }
  saveState();
  buildCalendar();
}

// ── Drag to span ──
let dragState = null;

function startDrag(e) {
  e.stopPropagation();
  e.preventDefault();
  const lernTag = parseInt(e.currentTarget.dataset.lernTag);
  const startX = e.clientX;
  const origSpan = spanMap[lernTag] || 0;
  dragState = { lernTag, startX, origSpan };
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
  if (!dragState) return;
  const CELL_W = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-w'));
  const dx = e.clientX - dragState.startX;
  // Each cell+gap ≈ CELL_W + 3px
  const extraDays = Math.max(0, Math.round(dx / (CELL_W + 3)));
  spanMap[dragState.lernTag] = Math.max(0, extraDays);
  saveState();
  buildCalendar();
}

function endDrag(e) {
  dragState = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
}

// ── Header stats ──
function updateHeader(assignment) {
  const keys = Object.keys(assignment).filter(k => !assignment[k].continued);
  document.getElementById('hdr-lerntage').textContent = keys.length;

  // Find last assigned date
  const lastKey = Object.keys(assignment).sort().pop();
  if (lastKey) {
    const [y,m,dd] = lastKey.split('-').map(Number);
    document.getElementById('hdr-end').textContent =
      `${dd}. ${MONTHS[m-1]} ${y}`;
  }
}

// ── Init ──
initSettingsPanel();
buildCalendar();

// Settings panel toggle
document.getElementById('settings-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('settings-panel').classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#settings-panel') && !e.target.closest('#settings-btn')) {
    document.getElementById('settings-panel').classList.remove('open');
  }
});
</script>
